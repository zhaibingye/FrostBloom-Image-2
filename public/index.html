<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GPT Image 2 - 图像生成与编辑</title>
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app" class="app">
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-inner">
        <div class="sidebar-header">
          <img src="logo.png" alt="Logo" class="sidebar-logo">
          <span class="sidebar-title">GPT Image 2</span>
        </div>
        <button id="newTaskBtn" class="new-task-btn">清空时间线</button>
        <div id="taskList" class="task-list"></div>
        <div id="emptyHistory" class="empty-history">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
          <p>暂无历史记录</p>
        </div>
      </div>
    </aside>
    <div id="sidebarOverlay" class="sidebar-overlay"></div>
    <main class="main">
      <header class="top-bar">
        <button id="menuBtn" class="icon-btn" title="菜单">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div class="top-bar-brand">
          <img src="logo.png" alt="" class="top-bar-logo">
          <span class="top-bar-title">GPT Image 2</span>
        </div>
        <button id="settingsTopBtn" class="icon-btn" title="设置">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
      </header>
      <div id="feed" class="feed">
        <div id="welcomeScreen" class="welcome">
          <div class="welcome-inner">
            <img src="logo.png" alt="" class="welcome-logo">
            <h1 class="welcome-title">使用 GPT Image 2 创作图像</h1>
            <p class="welcome-desc">输入描述开始生成图像，或上传图片进行编辑</p>
            <div class="welcome-cards">
              <div class="welcome-card" data-prompt="一只在雪地里行走的猫">
                <div class="welcome-card-icon">🐱</div>
                <div class="welcome-card-text">一只在雪地里行走的猫</div>
              </div>
              <div class="welcome-card" data-prompt="夕阳下的海边小镇">
                <div class="welcome-card-icon">🌅</div>
                <div class="welcome-card-text">夕阳下的海边小镇</div>
              </div>
              <div class="welcome-card" data-prompt="赛博朋克风格的城市夜景">
                <div class="welcome-card-icon">🌃</div>
                <div class="welcome-card-text">赛博朋克风格的城市夜景</div>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div id="inputArea" class="input-area">
        <div id="editIndicator" class="edit-indicator" style="display:none;">
          <img id="editPreview" src="" alt="" class="edit-preview-img">
          <span class="edit-label">编辑模式</span>
          <button id="cancelEditBtn" class="edit-cancel-btn" title="取消编辑">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
        <div id="uploadPreview" class="upload-preview" style="display:none;"></div>
        <div class="input-panel">
          <div class="input-panel-inner">
            <textarea id="promptInput" class="prompt-input" placeholder="描述你想要生成或编辑的图像..." rows="1"></textarea>
            <div class="toolbar">
              <button id="uploadBtn" class="toolbar-btn" title="上传图片">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
              </button>
              <button id="settingsBtn" class="toolbar-btn" title="设置">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
              </button>
              <button id="sendBtn" class="send-btn" title="发送" disabled>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
              </button>
            </div>
          </div>
        </div>
        <input type="file" id="fileInput" accept="image/png,image/jpeg,image/webp" multiple style="display:none;">
      </div>
    </main>
  </div>

  <div id="settingsModal" class="modal-overlay" style="display:none;">
    <div class="modal-content">
      <div class="modal-header">
        <h2>设置</h2>
        <button id="closeModal" class="icon-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="form-group">
        <label for="apiUrl">API URL</label>
        <input id="apiUrl" type="text" list="urlSuggestions" placeholder="https://newapi.yemoren.site/v1" autocomplete="off">
        <datalist id="urlSuggestions">
          <option value="https://newapi.yemoren.site">
          <option value="https://newapi.yemoren.site/v1">
          <option value="https://api.openai.com/v1">
        </datalist>
        <div class="form-hint">API 地址，通常以 /v1 结尾</div>
      </div>
      <div class="form-group">
        <label for="apiKey">API Key</label>
        <div class="key-input-wrap">
          <input id="apiKey" type="password" placeholder="sk-...">
          <button id="toggleKeyBtn" class="icon-btn-sm" title="显示/隐藏">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="quality">图片质量</label>
          <select id="quality">
            <option value="auto">自动</option>
            <option value="low">低</option>
            <option value="medium">中</option>
            <option value="high">高</option>
          </select>
        </div>
        <div class="form-group">
          <label for="size">图片尺寸</label>
          <select id="size">
            <option value="auto">自动</option>
            <option value="1024x1024">1024×1024</option>
            <option value="1536x1024">1536×1024</option>
            <option value="1024x1536">1024×1536</option>
            <option value="2048x2048">2048×2048</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label for="streamMode">生成模式</label>
          <select id="streamMode">
            <option value="stream">Responses API</option>
            <option value="classic">Image API</option>
          </select>
        </div>
        <div class="form-group">
          <label for="model">流式模型</label>
          <select id="model">
            <option value="gpt-5.4-mini">gpt-5.4-mini</option>
            <option value="gpt-5.4">gpt-5.4</option>
            <option value="gpt-5.5">gpt-5.5</option>
          </select>
        </div>
      </div>
      <div class="modal-actions">
        <button id="saveSettings" class="btn-primary">保存设置</button>
      </div>
    </div>
  </div>

  <div id="imageModal" class="modal-overlay" style="display:none;">
    <div class="image-modal-content">
      <button id="closeImageModal" class="icon-btn image-modal-close">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <img id="imageModalImg" src="" alt="" class="image-modal-img">
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
